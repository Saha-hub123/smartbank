<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBank Implementation Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="header-content">
                <div>
                    <h1>SmartBank Project Board</h1>
                    <p>Track implementasi fitur tanpa batas server (Local Mode)</p>
                </div>
                <div class="header-actions">
                    <label class="btn btn-outline" for="importCsv">
                        📂 Import CSV
                    </label>
                    <input type="file" id="importCsv" accept=".csv" style="display: none;">
                    
                    <button class="btn btn-outline" onclick="exportCSV()">📥 Export CSV</button>
                    <button class="btn btn-primary" onclick="openAddModal()">➕ Tambah Tugas</button>
                    <button class="btn btn-danger" onclick="resetData()">🔄 Reset Data</button>
                </div>
            </div>
        </header>

        <main class="board-container">
            <!-- Kolom Tertunda/Berjalan -->
            <div class="board-column">
                <div class="column-header">
                    <h2>📝 To Do / In Progress</h2>
                    <span class="count-badge" id="count-pending">0</span>
                </div>
                <div class="task-list" id="list-pending">
                    <!-- Tasks injected here -->
                </div>
            </div>

            <!-- Kolom Selesai -->
            <div class="board-column">
                <div class="column-header">
                    <h2>✅ Selesai</h2>
                    <span class="count-badge" id="count-completed">0</span>
                </div>
                <div class="task-list" id="list-completed">
                    <!-- Tasks injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form (Tambah/Edit) -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-content glass-card">
            <h2 id="modalTitle">Tambah Tugas Baru</h2>
            <form id="taskForm">
                <input type="hidden" id="taskIndex">
                <div class="form-group">
                    <label>Role / Kategori</label>
                    <input type="text" id="roleInput" placeholder="Contoh: Admin Bank" required>
                </div>
                <div class="form-group">
                    <label>Nama Fitur</label>
                    <input type="text" id="featureInput" placeholder="Contoh: Manajemen Saldo" required>
                </div>
                <div class="form-group">
                    <label>Deskripsi Detail</label>
                    <textarea id="descInput" rows="3" placeholder="Jelaskan implementasinya..." required></textarea>
                </div>
                <!-- Status input is hidden, handled by checkbox logic on board -->
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
